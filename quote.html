<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote — OP International Sourcing Agency</title>
  <link rel="icon" type="image/jpg" href="assets/img/logo.jpg">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main1.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="assets/js/products-data.js"></script>

  <style>
    .quote-section {
      padding: 80px 0 60px;
      background: #f8f8f6;
      min-height: 100vh;
    }

    .quote-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .quote-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #666;
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s;
    }

    .quote-back:hover {
      color: #111;
    }

    .quote-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .quote-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── PRODUCT CARD ── */
    .quote-product-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      overflow: hidden;
      position: sticky;
      top: 100px;
    }

    .quote-product-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .quote-product-body {
      padding: 20px;
    }

    .quote-product-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #f0f0ee;
      color: #555;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .quote-product-title {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .quote-product-desc {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .quote-product-specs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid #f0f0ee;
    }

    .spec-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .spec-label {
      color: #999;
    }

    .spec-value {
      color: #333;
      font-weight: 500;
      text-align: right;
      max-width: 60%;
    }

    .quote-product-price {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin-top: 14px;
    }

    .price-note {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    /* ── FORM ── */
    .quote-form-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      padding: 32px;
    }

    .form-heading {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }

    .form-subheading {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 13px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #111;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #888;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .btn-generate {
      flex: 1;
      min-width: 180px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 600;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-generate:hover {
      background: #333;
    }

    .btn-generate:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .btn-email {
      flex: 1;
      min-width: 180px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 600;
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .btn-email:hover {
      border-color: #888;
    }

    .form-note {
      font-size: 12px;
      color: #aaa;
      margin-top: 14px;
      line-height: 1.6;
    }

    .not-found {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="assets/img/logo.jpg" alt="OP International Sourcing Agency" class="logo-mark">
        <div class="logo-text">OP International <span>Sourcing Agency</span></div>
      </a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="blog.html">Resources</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="products.html" class="btn-primary-nav">Browse Products</a>
      </div>
      <button class="mobile-toggle" onclick="document.querySelector('.nav-menu').classList.toggle('show')">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </header>

  <section class="quote-section">
    <div class="quote-wrapper">

      <a href="products.html" class="quote-back">
        <i class="bi bi-arrow-left"></i> Back to products
      </a>

      <div id="quoteContent"></div>

    </div>
  </section>

  <script>
    // ─── CONFIG ──────────────────────────────────────
    const SELLER_EMAIL = "opinternationalsourcingagency@gmail.com";
    const SELLER_PHONE = "+86 195 8740 4164";
    const COMPANY_NAME = "OP International Sourcing Agency";
    const COMPANY_TAGLINE = "Source From China With Confidence";

    const container = document.getElementById('quoteContent');
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const product = PRODUCTS.find(p => p.title === title);

    if (!product) {
      container.innerHTML = `
    <div class="not-found">
      <i class="bi bi-box-seam" style="font-size:48px;margin-bottom:16px;display:block"></i>
      <h3>Product not found</h3>
      <p style="margin-top:8px"><a href="products.html">← Back to catalogue</a></p>
    </div>`;
    } else {
      renderPage();
    }

    function renderPage() {
      container.innerHTML = `
        <div class="quote-grid">

          <!-- LEFT: PRODUCT CARD -->
          <div class="quote-product-card">
            <img class="quote-product-img" src="${product.images[0]}" alt="${product.title}">
            <div class="quote-product-body">
              <span class="quote-product-badge">${product.badge}</span>
              <h2 class="quote-product-title">${product.title}</h2>
              <p class="quote-product-desc">${product.desc}</p>
              <div class="quote-product-specs">
                <div class="spec-row">
                  <span class="spec-label">${product.meta.label}</span>
                  <span class="spec-value">${product.meta.value}</span>
                </div>
                <div class="spec-row">
                  <span class="spec-label">Shipping</span>
                  <span class="spec-value">${product.shipping}</span>
                </div>
                <div class="spec-row">
                  <span class="spec-label">Category</span>
                  <span class="spec-value" style="text-transform:capitalize">${product.category}</span>
                </div>
              </div>
              <div class="quote-product-price">
                ${product.price}
                <span class="price-note"> / est. price</span>
              </div>
            </div>
          </div>

          <!-- RIGHT: FORM -->
          <div class="quote-form-card">
            <h2 class="form-heading">Request a Quote</h2>
            <p class="form-subheading">Fill in your details and we'll get back to you shortly.</p>

            <div class="form-row">
              <div class="form-group">
                <label>Full name *</label>
                <input type="text" id="buyerName" placeholder="Your full name">
              </div>
              <div class="form-group">
                <label>Phone number *</label>
                <input type="text" id="buyerPhone" placeholder="+233 ...">
              </div>
            </div>

            <div class="form-group">
              <label>Email address *</label>
              <input type="email" id="buyerEmail" placeholder="your@email.com">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Quantity</label>
                <input type="text" id="buyerQty" placeholder="e.g. 1 unit, 50 boxes">
              </div>
              <div class="form-group">
                <label>Delivery destination</label>
                <input type="text" id="buyerDest" placeholder="e.g. Accra, Ghana">
              </div>
            </div>

            <div class="form-group">
              <label>Additional notes</label>
              <textarea id="buyerNotes" placeholder="Colour, size preferences, special requirements..."></textarea>
            </div>

            <div class="form-actions">
              <button class="btn-generate" onclick="handleGenerate()" id="pdfBtn">
                <i class="bi bi-file-earmark-pdf"></i> Download Quote PDF
              </button>
              <button class="btn-email" onclick="sendEmail()" id="emailBtn">
                <i class="bi bi-envelope"></i> Send to Seller
              </button>
            </div>

            <p class="form-note">
              * Downloading the PDF saves a copy to your device. <br>
              "Send to Seller" opens your email app with the quote details pre-filled.
            </p>
          </div>

        </div>
      `;
    }

    // ── HELPERS ─────────────────────────────────────

    function getFormValues() {
      return {
        name: document.getElementById('buyerName')?.value.trim() || '',
        phone: document.getElementById('buyerPhone')?.value.trim() || '',
        email: document.getElementById('buyerEmail')?.value.trim() || '',
        qty: document.getElementById('buyerQty')?.value.trim() || 'Not specified',
        dest: document.getElementById('buyerDest')?.value.trim() || 'Not specified',
        notes: document.getElementById('buyerNotes')?.value.trim() || ''
      };
    }

    function validate(f) {
      if (!f.name) { alert('Please enter your full name.'); return false; }
      if (!f.phone) { alert('Please enter your phone number.'); return false; }
      if (!f.email) { alert('Please enter your email address.'); return false; }
      return true;
    }

    function quoteRef() {
      return 'OPI-' + Date.now().toString(36).toUpperCase().slice(-6);
    }

    function today() {
      return new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    // ── IMAGE LOADER ─────────────────────────────────
    function loadImageAsBase64(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          // Cap at 600px wide to keep PDF size reasonable
          const maxW = 600;
          const ratio = Math.min(maxW / img.width, 1);
          canvas.width = img.width * ratio;
          canvas.height = img.height * ratio;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = () => resolve(null); // gracefully skip if image fails
        img.src = src + '?t=' + Date.now(); // bust cache
      });
    }
    function pdfPrice(price) {
      return price.replace('₵', 'GHS ');
    }
    // ── PDF GENERATOR ────────────────────────────────
    async function handleGenerate() {
      const f = getFormValues();
      if (!validate(f)) return;

      const btn = document.getElementById('pdfBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generating...';

      try {
        await generatePDF(f);
      } catch (e) {
        console.error(e);
        alert('Could not generate PDF. Please try again.');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-file-earmark-pdf"></i> Download Quote PDF';
    }

    async function generatePDF(f) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const W = 210, PL = 20, PR = 20, CW = W - PL - PR;
      const ref = quoteRef();

      // ── HEADER BACKGROUND ──
      doc.setFillColor(17, 17, 17);
      doc.rect(0, 0, W, 38, 'F');

      // Company name
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.setTextColor(255, 255, 255);
      doc.text(COMPANY_NAME, PL, 18);

      // Tagline
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(170, 170, 170);
      doc.text(COMPANY_TAGLINE, PL, 26);

      // QUOTATION label (top right)
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(255, 255, 255);
      doc.text('QUOTATION', W - PR, 18, { align: 'right' });

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(170, 170, 170);
      doc.text(`Ref: ${ref}`, W - PR, 25, { align: 'right' });
      doc.text(`Date: ${today()}`, W - PR, 31, { align: 'right' });

      let y = 50;

      // ── PRODUCT SECTION HEADING ──
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      doc.text('PRODUCT DETAILS', PL, y);

      y += 4;
      doc.setDrawColor(220, 220, 220);
      doc.line(PL, y, W - PR, y);
      y += 8;

      // ── PRODUCT IMAGE ──
      const imgData = await loadImageAsBase64(product.images[0]);
      const imgX = PL, imgY = y;
      const imgW = 65, imgH = 49;

      if (imgData) {
        doc.addImage(imgData, 'JPEG', imgX, imgY, imgW, imgH);
        // thin border around image
        doc.setDrawColor(230, 230, 230);
        doc.rect(imgX, imgY, imgW, imgH);
      }

      // ── PRODUCT INFO (right of image) ──
      const infoX = PL + imgW + 10;
      const infoW = CW - imgW - 10;
      let iy = y;

      // Badge pill
      doc.setFillColor(240, 240, 238);
      doc.roundedRect(infoX, iy, 30, 6, 2, 2, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.setTextColor(100, 100, 100);
      doc.text(product.badge.toUpperCase(), infoX + 3, iy + 4.2);

      iy += 10;

      // Title
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.setTextColor(17, 17, 17);
      const titleLines = doc.splitTextToSize(product.title, infoW);
      doc.text(titleLines, infoX, iy);
      iy += titleLines.length * 6 + 2;

      // Description
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(100, 100, 100);
      const descLines = doc.splitTextToSize(product.desc, infoW);
      const descSlice = descLines.slice(0, 4); // max 4 lines
      doc.text(descSlice, infoX, iy);
      iy += descSlice.length * 4.5 + 5;

      // Specs table (small)
      const specs = [
        [product.meta.label, product.meta.value],
        ['Shipping', product.shipping],
        ['Category', product.category.charAt(0).toUpperCase() + product.category.slice(1)]
      ];

      specs.forEach(([label, value]) => {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8.5);
        doc.setTextColor(150, 150, 150);
        doc.text(label + ':', infoX, iy);

        doc.setFont('helvetica', 'normal');
        doc.setTextColor(50, 50, 50);
        const valLines = doc.splitTextToSize(value, infoW - 28);
        doc.text(valLines, infoX + 24, iy);
        iy += valLines.length * 4.5 + 1.5;
      });

      // Price
      iy += 3;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.setTextColor(17, 17, 17);
      doc.text(pdfPrice(product.price), infoX, iy);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(150, 150, 150);
      doc.text('', infoX + doc.getTextWidth(pdfPrice(product.price)) + 1, iy);

      // Move y past the image block
      y = imgY + imgH + 12;

      // ── BUYER DETAILS SECTION ──
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      doc.text('BUYER DETAILS', PL, y);

      y += 4;
      doc.setDrawColor(220, 220, 220);
      doc.line(PL, y, W - PR, y);
      y += 8;

      const buyerFields = [
        ['Full Name', f.name],
        ['Phone', f.phone],
        ['Email', f.email],
        ['Quantity', f.qty],
        ['Destination', f.dest],
      ];

      // Two-column layout for buyer fields
      const colW = CW / 2 - 5;
      let col1X = PL, col2X = PL + CW / 2 + 5;
      let col1Y = y, col2Y = y;

      buyerFields.forEach(([label, value], i) => {
        const x = i % 2 === 0 ? col1X : col2X;
        let ly = i % 2 === 0 ? col1Y : col2Y;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8.5);
        doc.setTextColor(150, 150, 150);
        doc.text(label.toUpperCase(), x, ly);
        ly += 4.5;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(30, 30, 30);
        const vlines = doc.splitTextToSize(value || '—', colW);
        doc.text(vlines, x, ly);
        ly += vlines.length * 5 + 5;

        if (i % 2 === 0) col1Y = ly; else col2Y = ly;
      });

      y = Math.max(col1Y, col2Y) + 4;

      // Notes
      if (f.notes) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8.5);
        doc.setTextColor(150, 150, 150);
        doc.text('ADDITIONAL NOTES', PL, y);
        y += 5;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(50, 50, 50);
        const noteLines = doc.splitTextToSize(f.notes, CW);
        doc.text(noteLines, PL, y);
        y += noteLines.length * 5 + 8;
      }

      // ── FOOTER ──
      const footerY = 272;
      doc.setFillColor(240, 240, 238);
      doc.rect(0, footerY, W, 25, 'F');

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(100, 100, 100);
      doc.text(`${COMPANY_NAME}  ·  ${SELLER_PHONE}  ·  ${SELLER_EMAIL}`, W / 2, footerY + 9, { align: 'center' });
      doc.text('Prices are estimates and subject to change. Final pricing confirmed upon order.', W / 2, footerY + 16, { align: 'center' });

      // Save
      const safeTitle = product.title.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      doc.save(`quote-${safeTitle}-${ref}.pdf`);
    }

    // ── SEND EMAIL ───────────────────────────────────
    function sendEmail() {
      const f = getFormValues();
      if (!validate(f)) return;

      const ref = quoteRef();
      const subject = `Quote Request: ${product.title} — ${ref}`;
      const body =
        `Hello OP International,

I would like to request a quote for the following product:

PRODUCT: ${product.title}
CATEGORY: ${product.category}
ESTIMATED PRICE: ${product.price}
${product.meta.label}: ${product.meta.value}
SHIPPING: ${product.shipping}
Product Image: ${window.location.origin}/${product.images[0]}

─────────────────────
BUYER DETAILS
─────────────────────
Name:         ${f.name}
Phone:        ${f.phone}
Email:        ${f.email}
Quantity:     ${f.qty}
Destination:  ${f.dest}
${f.notes ? `\nNotes:\n${f.notes}` : ''}

Reference: ${ref}
Date: ${today()}

Thank you.`;

      window.location.href =
        `mailto:${SELLER_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
  </script>

</body>

</html>
